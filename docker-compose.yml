services:
  db:
    build:
      context: './database'
      dockerfile: Dockerfile
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRESUSER}
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_DB: ${DBNAME}
    ports:
      - "${PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
    command: 
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=${DBNAME}"

    healthcheck:
      test: 
        - CMD-SHELL
        - "pg_isready -U ${POSTGRESUSER} -d ${DBNAME}"
      interval: 10s
      timeout: 5s
      retries: 5
    


  backend:
    container_name: fastapi_app
    build: ./backend
    image: chaddevhub/fastapi_app
    restart: always
    ports:
      - "8001:8000"

    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TZ=Asia/Manila


  frontend:
    build: 
      context: ./frontend
      args:
        NEXT_PUBLIC_WEBSOCKET_URL: wss://biselco79.com/v1/socket/ws
    image: chaddevhub/nextjs_app
    container_name: nextjs_app
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
