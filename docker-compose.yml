services:
  db:
    build:
      context: './database'
      dockerfile: Dockerfile
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRESUSER}
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_DB: ${DBNAME}
    ports:
      - "${PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
    command: 
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=${DBNAME}"

    healthcheck:
      test: 
        - CMD-SHELL
        - "pg_isready -U ${POSTGRESUSER} -d ${DBNAME}"
      interval: 10s
      timeout: 5s
      retries: 5
    
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: fastapi_app
    build: ./backend
    image: chaddevhub/fastapi_app
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Manila

  backend-dev:
    container_name: fastapi_app_dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    image: chaddevhub/fastapi_app:dev
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Manila
      - WATCHFILES_FORCE_POLLING=true


  frontend:
    build: 
      context: ./frontend
      args:
        NEXT_PUBLIC_WEBSOCKET_URL: wss://biselco79.com/v1/socket/ws
    image: chaddevhub/nextjs_app
    container_name: nextjs_app

    restart: always
    ports:
      - "3001:3001"

    env_file:
      - ./frontend/.env
    depends_on:
      - backend

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_WEBSOCKET_URL: ws://backend:8001/v1/socket/ws
    image: chaddevhub/nextjs_app:dev
    container_name: nextjs_app_dev
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      WATCHPACK_POLLING: "true"
    env_file:
      - ./frontend/.env
    # develop:
    #   watch:
    #     - path: ./frontend
    #       action: sync
    #       target: /app
    #       ignore:
    #         - node_modules/
    #         - .next/
    #     - action: rebuild
    #       path: package.json
    depends_on:
      - backend-dev

volumes:
  postgres_data:
