services:
  db:
    image: postgis/postgis:17-3.4
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: biselcowebsite
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: fastapi_app
    restart: always
    ports:
      - "8001:8001"	
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: nextjs_app
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  postgres_data:
